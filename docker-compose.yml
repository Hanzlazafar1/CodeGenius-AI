version: "3.9"

services:
  # ─────────────────────────────
  # BACKEND (FastAPI)
  # ─────────────────────────────
 backend:
  image: hanzlazafar/backend:latest
  container_name: codegenius-backend
  restart: unless-stopped

  environment:
    GROQ_API_KEY: "${GROQ_API_KEY}"
    GROQ_MODEL: "${GROQ_MODEL}"
    APP_ENV: "${APP_ENV}"

  ports:
    - "8000:8000"

  networks:
    - codegenius-net


  # ─────────────────────────────
  # FRONTEND (React + Nginx)
  # ─────────────────────────────
  frontend:
    image: hanzlazafar/frontend:latest
    container_name: codegenius-frontend
    restart: unless-stopped

    ports:
      - "80:80"

    environment:
      - VITE_API_URL=http://98.86.232.203:8000

    depends_on:
      - backend

    networks:
      - codegenius-net

    healthcheck:
      disable: true


networks:
  codegenius-net:
    driver: bridge
