version: "3.9"

services:
  # ─── Backend ─────────────────────────────────────
  backend:
    image: hanzlazafar/backend:latest
    container_name: codegenius-backend
    restart: unless-stopped
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama3-70b-8192}
      - APP_ENV=production
      - CORS_ORIGINS=http://localhost,http://localhost:80,http://${EC2_PUBLIC_IP}
    ports:
      - "8000:8000"
    networks:
      - codegenius-net

  # ─── Frontend ────────────────────────────────────
  frontend:
    image: hanzlazafar/frontend:latest
    container_name: codegenius-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - codegenius-net

networks:
  codegenius-net:
    driver: bridge
