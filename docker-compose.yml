services:
  # ─── FastAPI Backend ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codegenius-backend
    restart: unless-stopped
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama3-70b-8192}
      - APP_ENV=production
      - CORS_ORIGINS=http://localhost,http://localhost:80,http://${EC2_PUBLIC_IP}
    expose:
      - "8000"
    networks:
      - codegenius-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─── React Frontend (Nginx) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codegenius-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - codegenius-net
    depends_on:
      backend:
        condition: service_healthy

networks:
  codegenius-net:
    driver: bridge
