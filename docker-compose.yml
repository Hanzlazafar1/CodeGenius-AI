version: "3.9"

services:
  backend:
    image: hanzlazafar/backend:latest
    container_name: codegenius-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    networks:
      - codegenius-net

  frontend:
    image: hanzlazafar/frontend:latest
    container_name: codegenius-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://${EC2_PUBLIC_IP}:8000
    depends_on:
      - backend
    networks:
      - codegenius-net
    healthcheck:
      disable: true

networks:
  codegenius-net:
    driver: bridge
