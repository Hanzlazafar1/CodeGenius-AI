name: CI/CD Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT ----------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # ---------------- LOGIN DOCKER HUB ----------------
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ---------------- SET IMAGE TAG ----------------
      - name: Set Image Tag
        run: echo "TAG=$(date +%s)" >> $GITHUB_ENV

      # ---------------- BUILD BACKEND (NO CACHE) ----------------
      - name: Build Backend Image
        run: |
          docker build --no-cache \
            -t ${{ secrets.DOCKER_USERNAME }}/backend:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/backend:${{ env.TAG }} \
            ./backend

      # ---------------- BUILD FRONTEND (NO CACHE) ----------------
      - name: Build Frontend Image
        run: |
          docker build --no-cache \
            -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/frontend:${{ env.TAG }} \
            ./frontend

      # ---------------- PUSH IMAGES ----------------
      - name: Push Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:${{ env.TAG }}
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:${{ env.TAG }}

      # ---------------- DEPLOY TO EC2 ----------------
      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/CodeGenius-AI

            echo "Stopping containers..."
            docker-compose down --remove-orphans || true

            echo "Removing old containers..."
            docker rm -f codegenius-backend codegenius-frontend || true

            echo "Cleaning old images..."
            docker image prune -af || true

            echo "Pulling latest images..."
            docker-compose pull

            echo "Starting fresh deployment..."
            docker-compose up -d --force-recreate --remove-orphans

            echo "Deployment successful 🚀"
